# HYDRA — VPS-ready web deploy
#
# Usage on your VPS:
#   1. git clone https://github.com/Mithran-MV/Hydra.git && cd Hydra
#   2. (optional) rsync the latest agent logs from your dev machine to ./logs
#   3. docker compose up -d
#   4. open http://<vps-ip>:3000/dashboard
#
# The agents + AXL nodes run on the host (via npm run dev:agents) for the
# submission demo — they are NOT containerized here. Only the dashboard is
# deployed via this compose file. The dashboard reads agent state from the
# mounted ./logs volume.

version: "3.9"

services:
  hydra-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: hydra-web:latest
    container_name: hydra-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      OG_KV_LOCAL_DIR: /app/logs/og-kv
      EVENTS_PATH: /app/logs/events.jsonl
    volumes:
      # Mount agent log directory (read-only) so the SSE route can stream
      # head state + scars + events.
      - ./logs:/app/logs:ro
    networks:
      - hydra-net

networks:
  hydra-net:
    driver: bridge
