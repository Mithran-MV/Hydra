version: "3.9"

# Each head = one AXL node + one agent process.
# Separate services satisfy AXL "cross-node communication" qualification.

x-head-common: &head-common
  build:
    context: .
    dockerfile: agents/Dockerfile
  env_file: .env
  restart: "no"
  depends_on:
    - sse-broker

services:
  sse-broker:
    build:
      context: ./web
      dockerfile: Dockerfile.broker
    ports:
      - "4000:4000"
    environment:
      - PORT=4000

  axl-1:
    image: hydra-axl:latest
    build:
      context: ./axl
    ports:
      - "9002:9002"
    volumes:
      - ./keys/head-1.pem:/keys/private.pem:ro

  head-1:
    <<: *head-common
    environment:
      - HEAD_INDEX=1
      - HEAD_STRATEGY=aave_deposit
      - AXL_URL=http://axl-1:9002
      - SSE_BROKER_URL=http://sse-broker:4000
    depends_on:
      - axl-1
      - sse-broker

  axl-2:
    image: hydra-axl:latest
    build:
      context: ./axl
    ports:
      - "9003:9002"
    volumes:
      - ./keys/head-2.pem:/keys/private.pem:ro

  head-2:
    <<: *head-common
    environment:
      - HEAD_INDEX=2
      - HEAD_STRATEGY=univ4_lp
      - AXL_URL=http://axl-2:9002
      - SSE_BROKER_URL=http://sse-broker:4000
    depends_on:
      - axl-2
      - sse-broker

  axl-3:
    image: hydra-axl:latest
    build:
      context: ./axl
    ports:
      - "9004:9002"
    volumes:
      - ./keys/head-3.pem:/keys/private.pem:ro

  head-3:
    <<: *head-common
    environment:
      - HEAD_INDEX=3
      - HEAD_STRATEGY=payroll
      - AXL_URL=http://axl-3:9002
      - SSE_BROKER_URL=http://sse-broker:4000
    depends_on:
      - axl-3
      - sse-broker

  web:
    build:
      context: ./web
    ports:
      - "3000:3000"
    environment:
      - SSE_BROKER_URL=http://sse-broker:4000
    depends_on:
      - sse-broker
